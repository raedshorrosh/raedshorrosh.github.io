    const S = 64; 
    const D = S * Math.sqrt(2); 

    // Base definitions for all shapes
    const SHAPES = {
      0: { id: 0, color: '#ec4899', points: `0,0 ${S},0 ${S*2},${S} ${S},${S}` }, // Changed to bright pink
      1: { id: 1, color: '#3498db', points: `0,0 ${S*2},0 0,${S*2}` },
      2: { id: 2, color: '#9b59b6', points: `0,0 ${S*2},0 0,${S*2}` },
      3: { id: 3, color: '#1abc9c', points: `0,0 ${D},0 0,${D}` },
      4: { id: 4, color: '#e67e22', points: `0,0 ${S},0 ${S},${S} 0,${S}` },
      5: { id: 5, color: '#f1c40f', points: `0,0 ${S},0 0,${S}` },
      6: { id: 6, color: '#2ecc71', points: `0,0 ${S},0 0,${S}` },
    };

    // Calculates true vertex coordinates given translation, rotation, and flip
    const getVertices = (piece) => {
      const basePiece = SHAPES[piece.id];
      const basePts = basePiece.points.split(' ').map(p => {
        const [x, y] = p.split(',');
        return { x: parseFloat(x), y: parseFloat(y) };
      });
      const angle = piece.rotation * Math.PI / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return basePts.map(pt => {
        const fx = pt.x * piece.flipX;
        const fy = pt.y;
        const rx = fx * cos - fy * sin;
        const ry = fx * sin + fy * cos;
        return { x: piece.x + rx, y: piece.y + ry };
      });
    };

    // --- MAGNET LOGIC & MATH ---
    const getSnapPoints = (piece) => {
      const pointsStr = piece.points || SHAPES[piece.id]?.points;
      if (!pointsStr) return [];

      const basePts = pointsStr.split(' ').map(p => {
        const [x, y] = p.split(',');
        return { x: parseFloat(x), y: parseFloat(y) };
      });
      
      const allPts = [];
      for (let i = 0; i < basePts.length; i++) {
        const curr = basePts[i];
        const next = basePts[(i + 1) % basePts.length];
        
        // 3 POINTS ALIGNMENT: Start, Middle, and End (End is covered by the next edge's Start)
        // This divides the edge exactly in half, preserving pure Tangram math!
        for (let j = 0; j < 2; j++) {
          allPts.push({ 
            x: curr.x + (next.x - curr.x) * (j / 2), 
            y: curr.y + (next.y - curr.y) * (j / 2) 
          });
        }
      }

      const angle = piece.rotation * Math.PI / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);

      return allPts.map(pt => {
        const fx = pt.x * piece.flipX;
        const fy = pt.y;
        const rx = fx * cos - fy * sin;
        const ry = fx * sin + fy * cos;
        return { x: piece.x + rx, y: piece.y + ry };
      });
    };

    const healSilhouette = (pieces) => {
      if (!pieces || pieces.length === 0) return pieces;
      
      const fullPieces = pieces.map(p => ({
        ...p,
        points: p.points || SHAPES[p.id]?.points
      }));

      const healed = [fullPieces[0]];
      const unanchored = fullPieces.slice(1);
      
      while(unanchored.length > 0) {
        let bestIdx = -1;
        let bestDist = Infinity;
        let bestSnapDx = 0;
        let bestSnapDy = 0;
        
        unanchored.forEach((testPiece, idx) => {
          const testPoints = getSnapPoints(testPiece);
          healed.forEach(anchorPiece => {
            const anchorPoints = getSnapPoints(anchorPiece);
            testPoints.forEach(tp => {
              anchorPoints.forEach(ap => {
                const dist = Math.hypot(tp.x - ap.x, tp.y - ap.y);
                if (dist < bestDist) {
                  bestDist = dist;
                  bestSnapDx = ap.x - tp.x;
                  bestSnapDy = ap.y - tp.y;
                  bestIdx = idx;
                }
              });
            });
          });
        });
        
        if (bestIdx !== -1) {
          let p = unanchored[bestIdx];
          if (bestDist < 15 && bestDist > 0.01) {
            p.x += bestSnapDx;
            p.y += bestSnapDy;
          }
          healed.push(p);
          unanchored.splice(bestIdx, 1);
        } else {
          healed.push(unanchored.shift());
        }
      }
      
      return healed.map(({points, ...p}) => p);
    };

    const autoCenterSilhouette = (pieces, targetX, targetY) => {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      
      pieces.forEach(p => {
        const basePiece = SHAPES[p.id];
        if (!basePiece) return;
        const pts = getSnapPoints({ ...basePiece, ...p });
        pts.forEach(pt => {
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        });
      });

      const currentCenterX = (minX + maxX) / 2;
      const currentCenterY = (minY + maxY) / 2;
      
      const dx = targetX - currentCenterX;
      const dy = targetY - currentCenterY;
      
      return pieces.map(p => ({
        ...p,
        x: p.x + dx,
        y: p.y + dy
      }));
    };

    const getPieceCenter = (piece) => {
      const pts = getVertices(piece);
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      pts.forEach(p => {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      });
      return { x: (minX + maxX) / 2, y: (minY + maxY) / 2 };
    };

    const keepInBounds = (piece, viewW, viewH) => {
      const pts = getVertices(piece);
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      pts.forEach(p => {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      });
      
      let dx = 0, dy = 0;
      const pad = 10; 
      if (minX < pad) dx = pad - minX;
      else if (maxX > viewW - pad) dx = (viewW - pad) - maxX;
      
      if (minY < pad) dy = pad - minY;
      else if (maxY > viewH - pad) dy = (viewH - pad) - maxY;
      
      return { ...piece, x: piece.x + dx, y: piece.y + dy };
    };

      try {
        const lines = text.trim().split('\n')
          .map(l => l.trim().split(/\s+/).map(Number))
          .filter(l => l.length >= 6);
          
        if (lines.length < 7) return null;

        const idMap = [1, 2, 5, 6, 3, 4, 0];
        const parsedPieces = lines.slice(0, 7).map((l, i) => {
          const [X, Y, x1, y1, x2, y2] = l;
          const id = idMap[i];
          const DA = { x: X + x1, y: Y + y1 };
          const DB = { x: X + x2, y: Y + y2 };
          const dx = DB.x - DA.x;
          const dy = DB.y - DA.y;
          
          let delphiAngle = Math.atan2(dy, dx) * 180 / Math.PI;
          if (delphiAngle < 0) delphiAngle += 360;

          let rotation = 0;
          let nativeA = { x: 0, y: 0 };
          let flipX = 1;

          if ([1, 2, 3, 5, 6].includes(id)) {
            rotation = (delphiAngle + 270) % 360;
          } else if (id === 4) {
            rotation = (delphiAngle + 90) % 360;
            nativeA = { x: 64, y: 64 };
          } else if (id === 0) {
            rotation = delphiAngle;
            nativeA = { x: 64, y: 64 };
          }

          const rad = rotation * Math.PI / 180;
          const cos = Math.cos(rad);
          const sin = Math.sin(rad);
          const rotAx = nativeA.x * cos - nativeA.y * sin;
          const rotAy = nativeA.x * sin + nativeA.y * cos;

          return { 
            id, 
            x: DA.x - rotAx, 
            y: DA.y - rotAy, 
            rotation: Math.round(rotation / 45) * 45, 
            flipX
          };
        });

        return autoCenterSilhouette(healSilhouette(parsedPieces), targetX, targetY);
      } catch {

    // Component for rendering pure, auto-centered thumbnails for the menu
    const MiniSilhouette = ({ pieces, className = "" }) => {
      if (!pieces || pieces.length === 0) return null;
      
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      pieces.forEach(p => {
        const basePiece = SHAPES[p.id];
        if (!basePiece) return;
        const pts = getVertices({ ...basePiece, ...p });
        pts.forEach(pt => {
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = p.y;
        });
      });

      if (minX === Infinity) { minX = 0; maxX = 200; minY = 0; maxY = 200; }

      const pad = 15;
      const vX = minX - pad;
      const vY = minY - pad;
      const vW = (maxX - minX) + pad * 2;
      const vH = (maxY - minY) + pad * 2;

      return (
        <svg viewBox={`${vX} ${vY} ${vW} ${vH}`} className={`pointer-events-none drop-shadow-md ${className}`}>
          {pieces.map((piece, idx) => {
            const basePiece = SHAPES[piece.id];
            if (!basePiece) return null;
            return (
              <polygon
                key={`mini-${idx}`}
                points={basePiece.points}
                fill="#dc2626"
                stroke="#dc2626"
                strokeWidth="8"
                strokeLinejoin="round"
                transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
              />
            );
          })}
        </svg>
      );
    };

    // --- NEW: STRICT SHAPE COVERAGE WIN CHECK ENGINE ---
    const checkWinConditionCanvas = (currentPieces, targetPieces) => {
      if (!targetPieces || targetPieces.length === 0) return false;

      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      
      const updateBounds = (piece) => {
        getVertices(piece).forEach(v => {
          if (v.x < minX) minX = v.x;
          if (v.x > maxX) maxX = v.x;
          if (v.y < minY) minY = v.y;
          if (v.y > maxY) maxY = v.y;
        });
      };

      targetPieces.forEach(updateBounds);
      currentPieces.forEach(updateBounds);

      const pad = 20;
      const w = Math.ceil(maxX - minX + pad * 2);
      const h = Math.ceil(maxY - minY + pad * 2);
      
      if (w <= 0 || h <= 0 || w > 4000 || h > 4000) return false;

      const canvasA = document.createElement('canvas');
      const canvasB = document.createElement('canvas');
      canvasA.width = w; canvasA.height = h;
      canvasB.width = w; canvasB.height = h;

      const ctxA = canvasA.getContext('2d', { willReadFrequently: true });
      const ctxB = canvasB.getContext('2d');

      const drawOffsetX = minX - pad;
      const drawOffsetY = minY - pad;

      const drawPoly = (ctx, vertices) => {
        ctx.beginPath();
        ctx.moveTo(vertices[0].x - drawOffsetX, vertices[0].y - drawOffsetY);
        for(let i=1; i<vertices.length; i++) {
          ctx.lineTo(vertices[i].x - drawOffsetX, vertices[i].y - drawOffsetY);
        }
        ctx.closePath();
        ctx.fill();
      };

      ctxA.fillStyle = 'black';
      targetPieces.forEach(p => drawPoly(ctxA, getVertices(p)));

      ctxB.fillStyle = 'black';
      currentPieces.forEach(p => drawPoly(ctxB, getVertices(p)));

      ctxA.globalCompositeOperation = 'xor';
      ctxA.drawImage(canvasB, 0, 0);

      const imgData = ctxA.getImageData(0, 0, w, h);
      const data = imgData.data;
      let errorPixels = 0;
      for (let i = 3; i < data.length; i += 4) {
        if (data[i] > 128) errorPixels++;
      }

      return errorPixels < 500;
    };

    // --- MAIN APPLICATION ---

          const gap = 8;

          group1 = group1.map(p => ({ ...p, x: p.x + layout.INIT_X - shift - gap, y: p.y + layout.INIT_Y }));

      // --- NEW: Keyboard Navigation ---
      useEffect(() => {
        const handleKeyDown = (e) => {

          const levelKeys = Object.keys(processedLevels);
          const currentIndex = levelKeys.indexOf(activeLevel);

          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            e.preventDefault();
            const nextLevel = levelKeys[(currentIndex + 1) % levelKeys.length];
            loadLevel(nextLevel);
          } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            const prevLevel = levelKeys[(currentIndex - 1 + levelKeys.length) % levelKeys.length];
            loadLevel(prevLevel);

        window.addEventListener('keydown', handleKeyDown);

      const handleExportJSON = () => {
        const formattedPieces = pieces.map(p => 
          `{"id": ${p.id}, "x": ${Math.round(p.x)}, "y": ${Math.round(p.y)}, "rotation": ${p.rotation}, "flipX": ${p.flipX}}`

        const resultString = `"level##_Custom": [${formattedPieces.join(',\n' + indent)}\n${indent}]`;
        setExportData(resultString);
      };

      const copyToClipboard = () => {
        const textArea = document.createElement("textarea");

        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');

          console.error('Copy failed', err);
        }

      };

      const getPointerCoords = (e) => {
        if (!svgRef.current) return { x: 0, y: 0 };
        const CTM = svgRef.current.getScreenCTM();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - CTM.e) / CTM.a,
          y: (clientY - CTM.f) / CTM.d
        };
      };

      const activeSilhouetteData = processedLevels[activeLevel] || [];

      const calculateSnap = (testPiece, allPieces, targetSilhouette = []) => {
        let bestSnap = { ...testPiece };
        // LOWER MAGNET RADIUS: Shrunk from 20 down to 12 so it doesn't aggressively grab pieces!
        let bestDist = 12;

        const testPoints = getSnapPoints(testPiece);
        const otherPieces = allPieces.filter(p => p.id !== testPiece.id);

        const snapTargets = [...otherPieces, ...targetSilhouette];

        snapTargets.forEach(otherPiece => {
          const otherPoints = getSnapPoints(otherPiece);
          testPoints.forEach(tp => {
            otherPoints.forEach(op => {
              const dist = Math.hypot(tp.x - op.x, tp.y - op.y);
              if (dist < bestDist) {
                bestDist = dist;
                bestSnap.x = testPiece.x + (op.x - tp.x);
                bestSnap.y = testPiece.y + (op.y - tp.y);
              }
            });
          });
        });
        return bestSnap;
      };

      const flipPiece = (pieceId) => {
        if (pieceId !== 0) return;
        setPieces(prev => prev.map(p => {
          if (p.id === pieceId) {
            const oldCenter = getPieceCenter(p);
            let flipped = { ...p, flipX: p.flipX * -1 };
            const newCenter = getPieceCenter(flipped);
            flipped.x += (oldCenter.x - newCenter.x);
            flipped.y += (oldCenter.y - newCenter.y);
            
            flipped = keepInBounds(flipped, layout.VIEW_W, layout.VIEW_H);
            return calculateSnap(flipped, prev, mode === 'play' ? activeSilhouetteData : []);
          }
          return p;
        }));

      const handlePointerDown = (e, piece) => {

        dragStartPosRef.current = coords;

        if (hasWon) return;

          flipPiece(piece.id);

        const handlePointerMove = (e) => {
          if (draggingId === null) return;
          e.preventDefault();
          const coords = getPointerCoords(e);
          
          const startPos = dragStartPosRef.current;
          if (Math.abs(coords.x - startPos.x) > 3 || Math.abs(coords.y - startPos.y) > 3) {

            p.id === draggingId ? { ...p, x: coords.x - offset.x, y: coords.y - offset.y } : p

          if (draggingId !== null) {
            setPieces(prev => {
              let piece = prev.find(p => p.id === draggingId);

              if (!hasDraggedRef.current) {

                const newCenter = getPieceCenter(rotated);

              let snappedPiece = calculateSnap(piece, prev, mode === 'play' ? activeSilhouetteData : []);
              snappedPiece = keepInBounds(snappedPiece, layout.VIEW_W, layout.VIEW_H);
              
              return prev.map(p => p.id === draggingId ? snappedPiece : p);

      const formatLevelName = (key) => {
        if (key.includes('_Custom')) {
          return key.replace('_Custom', '').replace(/_/g, ' '); // Cleanly displays "level101"
        }
        return `Puzzle ${key.replace('level', '')}`;
      };

      return (
        <div className="min-h-screen bg-slate-800 text-slate-100 flex flex-col font-sans selection:bg-transparent relative">
          
          <div className="bg-slate-900 p-4 shadow-lg flex flex-wrap items-center justify-between border-b border-slate-700 gap-4">
            
            <div className="flex flex-wrap items-center gap-4">
              <h1 className="text-xl font-bold tracking-wider text-teal-400">TANGRAM V10.2 by Raed Shorrosh</h1>
              
              <div className="relative">
                <button 
                  onClick={() => setIsMenuOpen(!isMenuOpen)}
                  className="flex items-center bg-slate-800 border border-slate-600 hover:border-teal-400 text-slate-200 rounded-md px-3 py-1.5 focus:outline-none transition-colors shadow-sm w-48 md:w-56"
                  disabled={mode !== 'play'}
                >
                  <div className="w-8 h-8 mr-3 bg-slate-700 border border-slate-600 rounded overflow-hidden flex-shrink-0 flex items-center justify-center">
                    <MiniSilhouette pieces={activeSilhouetteData} className="w-full h-full p-0.5" />
                  </div>
                  <span className="flex-1 text-left text-sm font-medium truncate">
                    {formatLevelName(activeLevel)}
                  </span>
                  <span className="ml-2 text-[10px] text-slate-400 opacity-80">▼</span>
                </button>

                {isMenuOpen && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setIsMenuOpen(false)} />
                    <div className="absolute top-full mt-2 left-0 w-[280px] sm:w-[500px] bg-slate-800 border border-slate-600 shadow-2xl rounded-lg z-50 max-h-[60vh] overflow-y-auto p-4 flex flex-col">
                      <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-3 px-1 flex justify-between">
                        <span>Select Puzzle</span>
                        <span className="text-teal-400">({Object.keys(processedLevels).length} Levels)</span>
                      </h3>
                      <div className="grid grid-cols-4 sm:grid-cols-6 gap-3">
                        {Object.keys(processedLevels).map((levelKey, idx) => (
                          <button
                            key={levelKey}
                            onClick={() => { loadLevel(levelKey); setIsMenuOpen(false); }}
                            className={`relative aspect-[3/4] p-2 rounded-md border flex flex-col items-center justify-between transition-all overflow-hidden ${
                              activeLevel === levelKey 
                                ? 'border-teal-400 bg-slate-700 ring-2 ring-teal-400 shadow-inner' 
                                : 'border-slate-600 bg-slate-700 hover:bg-slate-600 hover:border-slate-400'
                            }`}
                          >
                            <div className="flex-1 w-full flex items-center justify-center mb-1 min-h-0">
                              <MiniSilhouette pieces={processedLevels[levelKey]} className="w-full h-full pointer-events-none p-1" />
                            </div>
                            <span className="w-5 h-5 flex-shrink-0 rounded-full flex items-center justify-center text-[9px] font-bold text-white bg-indigo-500 shadow-md border border-indigo-400/50 relative z-10">
                              {idx + 1}
                            </span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>

            <div className="flex flex-wrap items-center gap-4">
              <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                <button
                  onClick={() => { setMode('play'); setIsMenuOpen(false); }}
                  className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-colors ${mode === 'play' ? 'bg-teal-500 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  Play
                </button>
                <button
                  onClick={() => { setMode('build'); setIsMenuOpen(false); }}
                  className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-colors ${mode === 'build' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  Build
                </button>
              </div>

              <button 
                onClick={() => setPieces(initialPieces)}
                className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-1.5 rounded text-sm font-semibold transition-colors border border-slate-600"
              >
                Reset
              </button>
            </div>
          </div>
          
          <div className="flex-1 p-4 md:p-8 flex flex-col items-center justify-center overflow-hidden gap-4">
            
            <div className="relative bg-slate-100 rounded-xl shadow-2xl overflow-hidden border-4 border-slate-300 w-full max-w-[500px] md:max-w-[1000px] aspect-[2/3] md:aspect-[4/3] touch-none">
              
              <svg 
                ref={svgRef} 
                className="absolute inset-0 w-full h-full" 
                viewBox={`0 0 ${layout.VIEW_W} ${layout.VIEW_H}`} 
                onContextMenu={(e) => e.preventDefault()}
              >
                
                {mode === 'play' && activeSilhouetteData && activeSilhouetteData.map((piece, idx) => {
                  const basePiece = SHAPES[piece.id];
                  if (!basePiece) return null;
                  return (
                    <polygon
                      key={`sil-${idx}`}
                      points={basePiece.points}
                      fill="#94a3b8"
                      stroke="#94a3b8"
                      strokeWidth="4"
                      strokeLinejoin="round"
                      transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
                    />
                  );
                })}

                {pieces.map((piece) => (
                  <polygon
                    key={`piece-${piece.id}`}
                    points={piece.points}
                    fill={piece.color} 
                    stroke="#ffffff"
                    strokeWidth="2"
                    strokeLinejoin="round"
                    transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
                    className={`drop-shadow-md transition-opacity ${hasWon ? 'cursor-default' : 'cursor-pointer hover:opacity-90'}`}
                    onPointerDown={(e) => handlePointerDown(e, piece)}
                    onTouchStart={(e) => handleTouchStart(e, piece)}
                  />
                ))}
              </svg>
              
              {mode === 'build' && (
                <div className="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-none">
                  <div className="bg-white/90 backdrop-blur px-4 py-2 rounded-lg border border-slate-200 shadow-sm text-sm text-slate-700 font-medium hidden md:block">
                    <strong>Drag:</strong> 1 Finger/Click | <strong>Rotate:</strong> Quick Tap/Click | <strong>Flip Parallelogram:</strong> Right Click / 2-Finger Tap
                  </div>
                  
                  <button 
                    onClick={handleExportJSON}
                    className="pointer-events-auto bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg shadow-lg font-bold text-sm transition-colors flex items-center gap-2 ml-auto"
                  >
                    <span>💾 Save Data (JSON)</span>
                  </button>
                </div>
              )}

              {hasWon && (
                <div className="absolute bottom-4 right-4 md:bottom-8 md:right-8 z-40 pointer-events-auto">
                  <div className="bg-slate-800/95 backdrop-blur-md px-4 py-3 md:px-6 md:py-4 rounded-2xl md:rounded-full shadow-2xl border border-teal-500/50 flex flex-row items-center justify-center gap-3 md:gap-6 transform animate-in slide-in-from-bottom-4 fade-in duration-500">
                    
                    <h2 className="text-lg md:text-xl font-black text-teal-400 tracking-widest drop-shadow-md whitespace-nowrap">
                      SOLVED!
                    </h2>

                    <div className="flex gap-2">
                      <button 
                        onClick={() => { setHasWon(false); setPieces(initialPieces); }}
                        className="px-3 py-2 md:px-4 md:py-2 rounded-xl md:rounded-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold transition-colors shadow-md text-xs md:text-sm whitespace-nowrap"
                      >
                        Restart
                      </button>
                      <button 
                        onClick={() => {
                          const levelKeys = Object.keys(processedLevels);
                          const currentIndex = levelKeys.indexOf(activeLevel);
                          const nextLevel = levelKeys[(currentIndex + 1) % levelKeys.length];
                          loadLevel(nextLevel);
                        }}
                        className="px-3 py-2 md:px-4 md:py-2 rounded-xl md:rounded-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold transition-colors shadow-lg text-xs md:text-sm flex items-center gap-1 md:gap-2 whitespace-nowrap"
                      >
                        Next <span className="text-sm leading-none">&rarr;</span>
                      </button>
                    </div>

                  </div>
                </div>
              )}
            </div>
          </div>

          {exportData && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-4">
               <div className="bg-slate-800 p-6 rounded-lg shadow-2xl border border-slate-600 w-full max-w-lg flex flex-col">
                 <div className="flex justify-between items-center mb-4">
                   <h3 className="text-xl font-bold text-indigo-400">Exported Layout Data</h3>
                   <button onClick={() => setExportData(null)} className="text-slate-400 hover:text-white font-bold text-xl">&times;</button>
                 </div>
                 
                 <textarea 
                   className="w-full h-64 bg-slate-900 text-green-400 font-mono text-sm p-4 rounded mb-4 border border-slate-700 focus:outline-none resize-none" 
                   readOnly 
                   value={exportData} 
                 />
                 
                 <div className="flex justify-end gap-3">
                   <button 
                     onClick={copyToClipboard} 
                     className={`px-5 py-2 rounded font-bold text-sm transition-colors ${copySuccess ? 'bg-green-600 hover:bg-green-500' : 'bg-indigo-600 hover:bg-indigo-500'} text-white`}
                   >
                     {copySuccess ? '✓ Copied to Clipboard' : 'Copy to Clipboard'}
                   </button>
                   <button 
                     onClick={() => setExportData(null)} 
                     className="bg-slate-600 hover:bg-slate-500 text-white px-5 py-2 rounded font-bold text-sm"
                   >
                     Close
                   </button>
                 </div>
               </div>
            </div>
          )}
          
          <div className="w-full text-center pt-6 pb-12 sm:pb-8 text-slate-500 text-[13px] tracking-wide z-10 relative mt-auto">
            Created by <span className="font-semibold text-slate-400">Raed Shorrosh</span> • <a href="mailto:shorrosh@gmail.com" className="hover:text-teal-400 transition-colors">shorrosh@gmail.com</a>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
