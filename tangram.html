    // Base definitions for all shapes
    const SHAPES = {
      0: { id: 0, color: '#ec4899', points: `0,0 ${S},0 ${S*2},${S} ${S},${S}` }, // Changed to bright pink
      1: { id: 1, color: '#3498db', points: `0,0 ${S*2},0 0,${S*2}` },
      2: { id: 2, color: '#9b59b6', points: `0,0 ${S*2},0 0,${S*2}` },
      3: { id: 3, color: '#1abc9c', points: `0,0 ${D},0 0,${D}` },
      4: { id: 4, color: '#e67e22', points: `0,0 ${S},0 ${S},${S} 0,${S}` },
      5: { id: 5, color: '#f1c40f', points: `0,0 ${S},0 0,${S}` },
      6: { id: 6, color: '#2ecc71', points: `0,0 ${S},0 0,${S}` },
    };

    // Calculates true vertex coordinates given translation, rotation, and flip
    const getVertices = (piece) => {
      const basePiece = SHAPES[piece.id];
      const basePts = basePiece.points.split(' ').map(p => {
        const [x, y] = p.split(',');
        return { x: parseFloat(x), y: parseFloat(y) };
      });
      const angle = piece.rotation * Math.PI / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return basePts.map(pt => {
        const fx = pt.x * piece.flipX;
        const fy = pt.y;
        const rx = fx * cos - fy * sin;
        const ry = fx * sin + fy * cos;
        return { x: piece.x + rx, y: piece.y + ry };
      });
    };

    // --- MAGNET LOGIC & MATH ---
    const getSnapPoints = (piece) => {
      const pointsStr = piece.points || SHAPES[piece.id]?.points;
      if (!pointsStr) return [];

      const basePts = pointsStr.split(' ').map(p => {
        const [x, y] = p.split(',');
        return { x: parseFloat(x), y: parseFloat(y) };
      });
      
      const allPts = [];
      for (let i = 0; i < basePts.length; i++) {
        allPts.push(basePts[i]);
        const next = basePts[(i + 1) % basePts.length];
        allPts.push({ x: (basePts[i].x + next.x) / 2, y: (basePts[i].y + next.y) / 2 });
      }

      const angle = piece.rotation * Math.PI / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);

      return allPts.map(pt => {
        const fx = pt.x * piece.flipX;
        const fy = pt.y;
        const rx = fx * cos - fy * sin;
        const ry = fx * sin + fy * cos;
        return { x: piece.x + rx, y: piece.y + ry };
      });
    };

    const healSilhouette = (pieces) => {
      if (!pieces || pieces.length === 0) return pieces;
      
      const fullPieces = pieces.map(p => ({
        ...p,
        points: p.points || SHAPES[p.id]?.points
      }));

      const healed = [fullPieces[0]];
      const unanchored = fullPieces.slice(1);
      
      while(unanchored.length > 0) {
        let bestIdx = -1;
        let bestDist = Infinity;
        let bestSnapDx = 0;
        let bestSnapDy = 0;
        
        unanchored.forEach((testPiece, idx) => {
          const testPoints = getSnapPoints(testPiece);
          healed.forEach(anchorPiece => {
            const anchorPoints = getSnapPoints(anchorPiece);
            testPoints.forEach(tp => {
              anchorPoints.forEach(ap => {
                const dist = Math.hypot(tp.x - ap.x, tp.y - ap.y);
                if (dist < bestDist) {
                  bestDist = dist;
                  bestSnapDx = ap.x - tp.x;
                  bestSnapDy = ap.y - tp.y;
                  bestIdx = idx;
                }
              });
            });
          });
        });
        
        if (bestIdx !== -1) {
          let p = unanchored[bestIdx];
          if (bestDist < 15 && bestDist > 0.01) {
            p.x += bestSnapDx;
            p.y += bestSnapDy;
          }
          healed.push(p);
          unanchored.splice(bestIdx, 1);
        } else {
          healed.push(unanchored.shift());
        }
      }
      
      return healed.map(({points, ...p}) => p);
    };

    const autoCenterSilhouette = (pieces, targetX = 225, targetY = 337.5) => {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      
      pieces.forEach(p => {
        const basePiece = SHAPES[p.id];
        if (!basePiece) return;
        const pts = getSnapPoints({ ...basePiece, ...p });
        pts.forEach(pt => {
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        });
      });

      const currentCenterX = (minX + maxX) / 2;
      const currentCenterY = (minY + maxY) / 2;
      
      const dx = targetX - currentCenterX;
      const dy = targetY - currentCenterY;
      
      return pieces.map(p => ({
        ...p,
        x: Math.round(p.x + dx),
        y: Math.round(p.y + dy)
      }));
    };

        const lines = text.trim().split('\n')

          .filter(l => l.length >= 6);

          const id = idMap[i];
          const DA = { x: X + x1, y: Y + y1 };
          const DB = { x: X + x2, y: Y + y2 };
          const dx = DB.x - DA.x;
          const dy = DB.y - DA.y;
          
          let delphiAngle = Math.atan2(dy, dx) * 180 / Math.PI;
          if (delphiAngle < 0) delphiAngle += 360;

          let rotation = 0;
          let nativeA = { x: 0, y: 0 };
          let flipX = 1;

          if ([1, 2, 3, 5, 6].includes(id)) {
            rotation = (delphiAngle + 270) % 360;
          } else if (id === 4) {
            rotation = (delphiAngle + 90) % 360;
            nativeA = { x: 64, y: 64 };
          } else if (id === 0) {
            rotation = delphiAngle;
            nativeA = { x: 64, y: 64 };
          }

          const rad = rotation * Math.PI / 180;
          const cos = Math.cos(rad);
          const sin = Math.sin(rad);
          const rotAx = nativeA.x * cos - nativeA.y * sin;
          const rotAy = nativeA.x * sin + nativeA.y * cos;

          return { 
            id, 
            x: DA.x - rotAx, 
            y: DA.y - rotAy, 
            rotation: Math.round(rotation / 45) * 45, 
            flipX
          };
        });

        return autoCenterSilhouette(healSilhouette(parsedPieces), targetX, targetY);
      } catch {
        return null;
      }

    };

    const processedLevels = {};
    Object.keys(levelTexts).forEach(key => {
      processedLevels[key] = parseDatText(levelTexts[key], 225, 337.5);
    });

    const MiniSilhouette = ({ pieces, className = "" }) => {
      if (!pieces || pieces.length === 0) return null;
      return (
        <svg viewBox="50 100 350 466" className={`pointer-events-none drop-shadow-md ${className}`}>
          {pieces.map((piece, idx) => {
            const basePiece = SHAPES[piece.id];
            if (!basePiece) return null;
            return (
              <polygon
                key={`mini-${idx}`}
                points={basePiece.points}
                fill="#dc2626"
                stroke="#dc2626"
                strokeWidth="8"
                strokeLinejoin="round"
                transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
              />
            );
          })}
        </svg>
      );
    };


    // --- PURE SHAPE COVERAGE WIN CHECK ENGINE ---
    const checkWinConditionCanvas = (currentPieces, targetPieces) => {
      if (!targetPieces || targetPieces.length === 0) return false;

      const getCentroid = (pts) => {
        let areaSum = 0, cxSum = 0, cySum = 0;
        for (let i = 0; i < pts.length; i++) {
          const j = (i + 1) % pts.length;
          const factor = pts[i].x * pts[j].y - pts[j].x * pts[i].y;
          areaSum += factor;
          cxSum += (pts[i].x + pts[j].x) * factor;
          cySum += (pts[i].y + pts[j].y) * factor;
        }
        if (areaSum === 0) return { x: pts[0].x, y: pts[0].y, area: 0 };
        return { 
          x: cxSum / (3 * areaSum), 
          y: cySum / (3 * areaSum), 
          area: Math.abs(areaSum / 2) 
        };
      };

      const getCenterOfMass = (pieces) => {
        let totalArea = 0, cx = 0, cy = 0;
        pieces.forEach(p => {
          const c = getCentroid(getVertices(p));
          cx += c.x * c.area;
          cy += c.y * c.area;
          totalArea += c.area;
        });
        return { x: cx / totalArea, y: cy / totalArea };
      };

      const tCenter = getCenterOfMass(targetPieces);
      const cCenter = getCenterOfMass(currentPieces);
      
      const dx = tCenter.x - cCenter.x;
      const dy = tCenter.y - cCenter.y;

      let txMin = Infinity, txMax = -Infinity, tyMin = Infinity, tyMax = -Infinity;
      targetPieces.forEach(p => {
        getVertices(p).forEach(v => {
          txMin = Math.min(txMin, v.x); txMax = Math.max(txMax, v.x);
          tyMin = Math.min(tyMin, v.y); tyMax = Math.max(tyMax, v.y);
        });
      });

      const pad = 40;
      const w = Math.ceil(txMax - txMin) + pad * 2;
      const h = Math.ceil(tyMax - tyMin) + pad * 2;
      
      if (w <= 0 || h <= 0 || w > 3000 || h > 3000) return false;

      const canvasA = document.createElement('canvas');
      const canvasB = document.createElement('canvas');
      canvasA.width = w; canvasA.height = h;
      canvasB.width = w; canvasB.height = h;

      const ctxA = canvasA.getContext('2d', { willReadFrequently: true });
      const ctxB = canvasB.getContext('2d');

      const drawOffsetX = txMin - pad;
      const drawOffsetY = tyMin - pad;

      const drawPoly = (ctx, vertices) => {
        ctx.beginPath();
        ctx.moveTo(vertices[0].x - drawOffsetX, vertices[0].y - drawOffsetY);
        for(let i=1; i<vertices.length; i++) {
          ctx.lineTo(vertices[i].x - drawOffsetX, vertices[i].y - drawOffsetY);
        }
        ctx.closePath();
        ctx.fill();
      };

      ctxA.fillStyle = 'black';
      targetPieces.forEach(p => drawPoly(ctxA, getVertices(p)));

      ctxB.fillStyle = 'black';
      currentPieces.forEach(p => {
        const verts = getVertices(p).map(v => ({ x: v.x + dx, y: v.y + dy }));
        drawPoly(ctxB, verts);
      });

      ctxA.globalCompositeOperation = 'xor';
      ctxA.drawImage(canvasB, 0, 0);

      const imgData = ctxA.getImageData(0, 0, w, h);
      const data = imgData.data;
      let errorPixels = 0;
      for (let i = 3; i < data.length; i += 4) {
        if (data[i] > 128) errorPixels++;
      }

      return errorPixels < 2000;
    };

    // --- GEMINI LLM INTEGRATION ---
    const generateShapeImage = (piecesToDraw) => {
      if (!piecesToDraw || piecesToDraw.length === 0) return null;
      let txMin = Infinity, txMax = -Infinity, tyMin = Infinity, tyMax = -Infinity;
      piecesToDraw.forEach(p => {
        getVertices(p).forEach(v => {
          txMin = Math.min(txMin, v.x); txMax = Math.max(txMax, v.x);
          tyMin = Math.min(tyMin, v.y); tyMax = Math.max(tyMax, v.y);
        });
      });

      const pad = 40;
      const w = Math.ceil(txMax - txMin) + pad * 2;
      const h = Math.ceil(tyMax - tyMin) + pad * 2;

      if (w <= 0 || h <= 0 || w > 2000 || h > 2000) return null;

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, w, h);

      const drawOffsetX = txMin - pad;
      const drawOffsetY = tyMin - pad;

      ctx.fillStyle = 'black';
      piecesToDraw.forEach(p => {
        const verts = getVertices(p);
        ctx.beginPath();
        ctx.moveTo(verts[0].x - drawOffsetX, verts[0].y - drawOffsetY);
        for(let i=1; i<verts.length; i++) {
          ctx.lineTo(verts[i].x - drawOffsetX, verts[i].y - drawOffsetY);
        }
        ctx.closePath();
        ctx.fill();
      });

      return canvas.toDataURL('image/png').split(',')[1];
    };

    const fetchGeminiInterpretation = async (base64Image) => {
      const apiKey = "";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{
          role: "user",
          parts: [
            { text: "Look at this solid black tangram shape. What real-world object, animal, or person does it resemble? Use your imagination. Return a JSON object with 'title' (a short, catchy name for the shape) and 'story' (a whimsical 1-2 sentence description)." },
            { inlineData: { mimeType: "image/png", data: base64Image } }
          ]
        }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              story: { type: "STRING" }
            }
          }
        }
      };

      let delay = 1000;
      for (let i = 0; i < 5; i++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(`API Error: ${res.status}`);
          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error("No text in response");
          return JSON.parse(text);
        } catch (err) {
          if (i === 4) throw err;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }
    };


    // --- MAIN APPLICATION ---
    function App() {
      const [activeLevel, setActiveLevel] = useState('level1');
      const [mode, setMode] = useState('play'); // play | build
      const [pieces, setPieces] = useState(initialPieces);
      const [hasWon, setHasWon] = useState(false);
      
      // UI State
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [exportData, setExportData] = useState(null);
      const [copySuccess, setCopySuccess] = useState(false);

      // Gemini State
      const [isInterpreting, setIsInterpreting] = useState(false);
      const [interpretation, setInterpretation] = useState(null);
      const [interpretationError, setInterpretationError] = useState(null);

      // Drag State
      const [draggingId, setDraggingId] = useState(null);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const svgRef = useRef(null);
      
      // NEW: Trackers to distinguish a "Tap" from a "Drag"
      const hasDraggedRef = useRef(false);
      const dragStartPosRef = useRef({ x: 0, y: 0 });

      const loadLevel = (level) => {
        setActiveLevel(level);
        setPieces(initialPieces); 
        setHasWon(false);
      };

      const handleExportJSON = () => {
        const payload = pieces.map(({ id, x, y, rotation, flipX }) => ({
          id,
          x: Math.round(x),
          y: Math.round(y),
          rotation,
          flipX
        }));
        setExportData(JSON.stringify(payload, null, 2));
      };

      const handleInterpret = async () => {
        const targetPieces = (mode === 'play' && !hasWon) ? processedLevels[activeLevel] : pieces;
        if (!targetPieces || targetPieces.length === 0) return;

        setIsInterpreting(true);
        setInterpretationError(null);
        try {
          const base64 = generateShapeImage(targetPieces);
          if (!base64) throw new Error("Failed to generate image from shapes.");
          const result = await fetchGeminiInterpretation(base64);
          setInterpretation(result);
        } catch (err) {
          console.error("Interpretation failed", err);
          setInterpretationError("Oops! The AI couldn't look at the shape right now. Try again later.");
          setTimeout(() => setInterpretationError(null), 3000);
        } finally {
          setIsInterpreting(false);
        }
      };

      const copyToClipboard = () => {
        const textArea = document.createElement("textarea");
        textArea.value = exportData;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopySuccess(true);
          setTimeout(() => setCopySuccess(false), 2000);
        } catch (err) {
          console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
      };

      const getPointerCoords = (e) => {
        if (!svgRef.current) return { x: 0, y: 0 };
        const CTM = svgRef.current.getScreenCTM();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - CTM.e) / CTM.a,
          y: (clientY - CTM.f) / CTM.d
        };
      };

      const activeSilhouetteData = processedLevels[activeLevel] || [];

      const calculateSnap = (testPiece, allPieces, targetSilhouette = []) => {
        let bestSnap = { ...testPiece };
        let bestDist = 20; // 20px snap radius

        const testPoints = getSnapPoints(testPiece);
        const otherPieces = allPieces.filter(p => p.id !== testPiece.id);

        const snapTargets = [...otherPieces, ...targetSilhouette];

        snapTargets.forEach(otherPiece => {
          const otherPoints = getSnapPoints(otherPiece);
          testPoints.forEach(tp => {
            otherPoints.forEach(op => {
              const dist = Math.hypot(tp.x - op.x, tp.y - op.y);
              if (dist < bestDist) {
                bestDist = dist;
                bestSnap.x = testPiece.x + (op.x - tp.x);
                bestSnap.y = testPiece.y + (op.y - tp.y);
              }
            });
          });
        });
        return bestSnap;
      };

      const flipPiece = (pieceId) => {
        if (pieceId !== 0) return;
        setPieces(prev => prev.map(p => {
          if (p.id === pieceId) {
            return calculateSnap({ ...p, flipX: p.flipX * -1 }, prev, mode === 'play' ? activeSilhouetteData : []);
          }
          return p;
        }));
      };

      const handlePointerDown = (e, piece) => {
        if (hasWon) return; 
        
        e.preventDefault();
        e.stopPropagation();

        // Right-Click -> Flip Parallelogram
        if (e.button === 2) {
          if (piece.id === 0) flipPiece(piece.id);
          return;
        }

        if (e.button !== 0 && e.pointerType === 'mouse') return;

        const coords = getPointerCoords(e);
        setDraggingId(piece.id);
        setOffset({ x: coords.x - piece.x, y: coords.y - piece.y });
        
        // Reset our drag trackers when we grab a new piece
        hasDraggedRef.current = false;
        dragStartPosRef.current = coords;
        
        setPieces(prev => {
          const p = prev.find(i => i.id === piece.id);
          return [...prev.filter(i => i.id !== piece.id), p];
        });
      };

      const handleTouchStart = (e, piece) => {
        if (hasWon) return;
        // Two-Finger Tap -> Flip Parallelogram
        if (e.touches.length === 2 && piece.id === 0) {
          e.preventDefault();
          e.stopPropagation();
          flipPiece(piece.id);
          setDraggingId(null); // Cancel any drag from the first finger
        }
      };

      useEffect(() => {
        const handlePointerMove = (e) => {
          if (draggingId === null) return;
          e.preventDefault();
          const coords = getPointerCoords(e);
          
          // If the pointer moves more than 3 units, it's definitely a drag, not a tap
          const startPos = dragStartPosRef.current;
          if (Math.abs(coords.x - startPos.x) > 3 || Math.abs(coords.y - startPos.y) > 3) {
            hasDraggedRef.current = true;
          }

          setPieces(prev => prev.map(p => 
            p.id === draggingId ? { ...p, x: coords.x - offset.x, y: coords.y - offset.y } : p
          ));
        };

        const handlePointerUp = () => {
          if (draggingId !== null) {
            setPieces(prev => {
              let piece = prev.find(p => p.id === draggingId);
              if (!piece) return prev;

              // SMART TAP: If we released without dragging, rotate the piece!
              if (!hasDraggedRef.current) {
                piece = { ...piece, rotation: (piece.rotation + 45) % 360 };
              }

              // Snap the piece (whether it was dropped or just rotated)
              const snappedPiece = calculateSnap(piece, prev, mode === 'play' ? activeSilhouetteData : []);
              return prev.map(p => p.id === draggingId ? snappedPiece : p);
            });
            setDraggingId(null);
          }
        };

        if (draggingId !== null) {
          window.addEventListener('pointermove', handlePointerMove, { passive: false });
          window.addEventListener('pointerup', handlePointerUp);
          window.addEventListener('touchmove', handlePointerMove, { passive: false });
          window.addEventListener('touchend', handlePointerUp);
        }

        return () => {
          window.removeEventListener('pointermove', handlePointerMove);
          window.removeEventListener('pointerup', handlePointerUp);
          window.removeEventListener('touchmove', handlePointerMove);
          window.removeEventListener('touchend', handlePointerUp);
        };
      }, [draggingId, offset, mode, activeSilhouetteData]);

      useEffect(() => {
        if (mode === 'play' && !hasWon) {
          if (checkWinConditionCanvas(pieces, activeSilhouetteData)) {
            setHasWon(true);
          }
        }
      }, [pieces, mode, activeSilhouetteData, hasWon]);

      return (
        <div className="min-h-screen bg-slate-800 text-slate-100 flex flex-col font-sans selection:bg-transparent relative">
          
          {/* Toast Error Notification */}
          {interpretationError && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[60] bg-red-900 text-white px-6 py-3 rounded-lg shadow-2xl border border-red-500 font-bold text-sm tracking-wide transition-all animate-in fade-in slide-in-from-top-4">
              {interpretationError}
            </div>
          )}

          {/* Top Toolbar */}
          <div className="bg-slate-900 p-4 shadow-lg flex flex-wrap items-center justify-between border-b border-slate-700 gap-4">
            
            <div className="flex flex-wrap items-center gap-4">
              <h1 className="text-xl font-bold tracking-wider text-teal-400">TANGRAM V10.0</h1>
              
              <div className="relative">
                <button 
                  onClick={() => setIsMenuOpen(!isMenuOpen)}
                  className="flex items-center bg-slate-800 border border-slate-600 hover:border-teal-400 text-slate-200 rounded-md px-3 py-1.5 focus:outline-none transition-colors shadow-sm w-48 md:w-56"
                  disabled={mode !== 'play'}
                >
                  <div className="w-8 h-8 mr-3 bg-slate-700 border border-slate-600 rounded overflow-hidden flex-shrink-0 flex items-center justify-center">
                    <MiniSilhouette pieces={activeSilhouetteData} className="w-full h-full transform scale-[1.5]" />
                  </div>
                  <span className="flex-1 text-left text-sm font-medium truncate">
                    Puzzle {activeLevel.replace('level', '')}
                  </span>
                  <span className="ml-2 text-[10px] text-slate-400 opacity-80">▼</span>
                </button>

                {isMenuOpen && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setIsMenuOpen(false)} />
                    <div className="absolute top-full mt-2 left-0 w-[280px] sm:w-[400px] bg-slate-800 border border-slate-600 shadow-2xl rounded-lg z-50 max-h-[60vh] overflow-y-auto p-4 flex flex-col">
                      <h3 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-3 px-1">
                        Select Puzzle
                      </h3>
                      <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                        {Object.keys(processedLevels).map((levelKey, idx) => (
                          <button
                            key={levelKey}
                            onClick={() => { loadLevel(levelKey); setIsMenuOpen(false); }}
                            className={`relative aspect-[3/4] p-2 rounded-md border flex flex-col items-center justify-between transition-all overflow-hidden ${
                              activeLevel === levelKey 
                                ? 'border-teal-400 bg-slate-700 ring-2 ring-teal-400 shadow-inner' 
                                : 'border-slate-600 bg-slate-700 hover:bg-slate-600 hover:border-slate-400'
                            }`}
                          >
                            <div className="flex-1 w-full flex items-center justify-center mb-1 min-h-0">
                              <MiniSilhouette pieces={processedLevels[levelKey]} className="w-full h-full transform scale-[1.8] pointer-events-none origin-center" />
                            </div>
                            <span className="w-5 h-5 flex-shrink-0 rounded-full flex items-center justify-center text-[10px] font-bold text-white bg-indigo-500 shadow-md border border-indigo-400/50 relative z-10">
                              {idx + 1}
                            </span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>

            <div className="flex flex-wrap items-center gap-4">
              
              {/* Gemini Feature Button */}
              <button
                onClick={handleInterpret}
                disabled={isInterpreting}
                className="bg-purple-600 hover:bg-purple-500 disabled:bg-purple-800 text-white px-4 py-1.5 rounded-md text-sm font-bold transition-colors border border-purple-500 shadow-md flex items-center justify-center min-w-[160px]"
              >
                {isInterpreting ? (
                  <span className="flex items-center gap-2 animate-pulse text-purple-200">✨ Looking...</span>
                ) : (
                  <span className="flex items-center gap-2 drop-shadow-sm">✨ Interpret Shape</span>
                )}
              </button>

              <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                <button
                  onClick={() => { setMode('play'); setIsMenuOpen(false); }}
                  className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-colors ${mode === 'play' ? 'bg-teal-500 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  Play
                </button>
                <button
                  onClick={() => { setMode('build'); setIsMenuOpen(false); }}
                  className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-colors ${mode === 'build' ? 'bg-indigo-500 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  Build
                </button>
              </div>

              <button 
                onClick={() => setPieces(initialPieces)}
                className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-1.5 rounded text-sm font-semibold transition-colors border border-slate-600"
              >
                Reset
              </button>
            </div>
          </div>
          
          {/* Main Board Area */}
          <div className="flex-1 p-4 md:p-8 flex flex-col items-center justify-center overflow-hidden gap-4">
            
            <div className="relative bg-slate-100 rounded-xl shadow-2xl overflow-hidden border-4 border-slate-300 w-full max-w-[900px] aspect-[4/3] touch-none">
              <svg ref={svgRef} className="absolute inset-0 w-full h-full" viewBox="0 0 900 675" onContextMenu={(e) => e.preventDefault()}>
                
                {/* Play Mode Solid Background Silhouette - Darker */}
                {mode === 'play' && activeSilhouetteData && activeSilhouetteData.map((piece, idx) => {
                  const basePiece = SHAPES[piece.id];
                  if (!basePiece) return null;
                  return (
                    <polygon
                      key={`sil-${idx}`}
                      points={basePiece.points}
                      fill="#94a3b8"
                      stroke="#94a3b8"
                      strokeWidth="4"
                      strokeLinejoin="round"
                      transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
                    />
                  );
                })}

                {/* Interactive Pieces Layer */}
                {pieces.map((piece) => (
                  <polygon
                    key={`piece-${piece.id}`}
                    points={piece.points}
                    fill={piece.color} 
                    stroke="#ffffff"
                    strokeWidth="2"
                    strokeLinejoin="round"
                    transform={`translate(${piece.x}, ${piece.y}) rotate(${piece.rotation}) scale(${piece.flipX}, 1)`}
                    className={`drop-shadow-md transition-opacity ${hasWon ? 'cursor-default' : 'cursor-pointer hover:opacity-90'}`}
                    onPointerDown={(e) => handlePointerDown(e, piece)}
                    onTouchStart={(e) => handleTouchStart(e, piece)}
                  />
                ))}
              </svg>
              
              {mode === 'build' && (
                <div className="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-none">
                  <div className="bg-white/90 backdrop-blur px-4 py-2 rounded-lg border border-slate-200 shadow-sm text-sm text-slate-700 font-medium">
                    <strong>Drag:</strong> 1 Finger/Click | <strong>Rotate:</strong> Quick Tap/Click | <strong>Flip Parallelogram:</strong> Right Click / 2-Finger Tap
                  </div>
                  
                  <button 
                    onClick={handleExportJSON}
                    className="pointer-events-auto bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg shadow-lg font-bold text-sm transition-colors flex items-center gap-2"
                  >
                    <span>💾 Save Data (JSON)</span>
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* Gemini Interpretation Modal Overlay */}
          {interpretation && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-4 backdrop-blur-sm">
              <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-purple-500 max-w-md w-full relative transform animate-in zoom-in duration-300">
                <button onClick={() => setInterpretation(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <div className="text-5xl mb-4 text-center animate-bounce">✨</div>
                <h2 className="text-3xl font-black text-purple-400 mb-3 text-center drop-shadow-sm">{interpretation.title}</h2>
                <p className="text-slate-300 text-lg leading-relaxed text-center mb-8 font-medium">
                  {interpretation.story}
                </p>
                <div className="flex justify-center">
                  <button 
                    onClick={() => setInterpretation(null)} 
                    className="bg-purple-600 hover:bg-purple-500 px-8 py-2.5 rounded-full text-white font-bold transition-colors shadow-lg"
                  >
                    Awesome!
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Win State Overlay - Floating Compact Pill */}
          {hasWon && (
            <div className="absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-40 pointer-events-auto">
              <div className="bg-slate-800/95 backdrop-blur-md px-5 py-3 md:px-6 md:py-4 rounded-full shadow-2xl border border-teal-500/50 flex flex-row items-center gap-4 md:gap-6 transform animate-in slide-in-from-bottom-8 fade-in duration-500">
                
                {/* Title */}
                <h2 className="text-lg md:text-xl font-black text-teal-400 tracking-widest drop-shadow-md whitespace-nowrap hidden sm:block">
                  PUZZLE SOLVED!
                </h2>
                <h2 className="text-lg font-black text-teal-400 tracking-widest drop-shadow-md whitespace-nowrap sm:hidden">
                  SOLVED!
                </h2>

                {/* Actions */}
                <div className="flex gap-2 md:gap-3">
                  <button 
                    onClick={() => { setHasWon(false); setPieces(initialPieces); }}
                    className="px-4 py-2 rounded-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold transition-colors shadow-md text-xs md:text-sm whitespace-nowrap"
                  >
                    Restart
                  </button>
                  <button 
                    onClick={() => {
                      const levelKeys = Object.keys(processedLevels);
                      const currentIndex = levelKeys.indexOf(activeLevel);
                      const nextLevel = levelKeys[(currentIndex + 1) % levelKeys.length];
                      loadLevel(nextLevel);
                    }}
                    className="px-4 py-2 rounded-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold transition-colors shadow-lg text-xs md:text-sm flex items-center gap-2 whitespace-nowrap"
                  >
                    Next <span className="text-base leading-none">&rarr;</span>
                  </button>
                </div>

              </div>
            </div>
          )}

          {/* JSON Export Modal Dialog */}
          {exportData && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-4">
               <div className="bg-slate-800 p-6 rounded-lg shadow-2xl border border-slate-600 w-full max-w-lg flex flex-col">
                 <div className="flex justify-between items-center mb-4">
                   <h3 className="text-xl font-bold text-indigo-400">Exported Layout Data</h3>
                   <button onClick={() => setExportData(null)} className="text-slate-400 hover:text-white font-bold text-xl">&times;</button>
                 </div>
                 
                 <textarea 
                   className="w-full h-64 bg-slate-900 text-green-400 font-mono text-sm p-4 rounded mb-4 border border-slate-700 focus:outline-none resize-none" 
                   readOnly 
                   value={exportData} 
                 />
                 
                 <div className="flex justify-end gap-3">
                   <button 
                     onClick={copyToClipboard} 
                     className={`px-5 py-2 rounded font-bold text-sm transition-colors ${copySuccess ? 'bg-green-600 hover:bg-green-500' : 'bg-indigo-600 hover:bg-indigo-500'} text-white`}
                   >
                     {copySuccess ? '✓ Copied to Clipboard' : 'Copy to Clipboard'}
                   </button>
                   <button 
                     onClick={() => setExportData(null)} 
                     className="bg-slate-600 hover:bg-slate-500 text-white px-5 py-2 rounded font-bold text-sm"
                   >
                     Close
                   </button>
                 </div>
               </div>
            </div>
          )}
          
        </div>
      );
    }

    // --- RENDER APP ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
